services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/testapi
    volumes:
      - ./server/uploads:/app/server/uploads
      - ./server/audio:/app/server/audio
      - ./server/renders:/app/server/renders
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
