services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/testapi
    volumes:
      - ./server/uploads:/app/server/uploads
      - ./server/audio:/app/server/audio
      - ./server/renders:/app/server/renders
    depends_on:
      - mongo

  frontend:
    build:
      context: ./test
      args:
        VITE_API_BASE: ""
    ports:
      - "${FRONTEND_HTTP_PORT:-8081}:80"
    depends_on:
      - api

  caddy:
    image: caddy:2.8.4
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  caddy_data:
  caddy_config:
